name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OpenAPI_Companion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: OpenAPI_Companion/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Type-check
        run: npm run typecheck
      - name: Unit + component tests (coverage)
        run: npm run test:coverage
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Build extension
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: OpenAPI_Companion/dist/
          if-no-files-found: error

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: OpenAPI_Companion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: OpenAPI_Companion/package-lock.json
      - run: npm ci
      - name: Build extension
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke
        run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: OpenAPI_Companion/playwright-report/
          if-no-files-found: ignore
