name: Release

# Trigger on any version tag: v0.1.0, v1.2.3-beta.1, etc.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create a GitHub Release

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build the extension into dist/
      - name: Build extension
        run: npm run build

      # Zip the dist/ folder as openapi-companion-<version>.zip
      - name: Zip dist folder
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_NAME="openapi-companion-${VERSION}.zip"
          cd dist
          zip -r "../${ZIP_NAME}" .
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        id: package

      # Create the GitHub Release and attach the zip
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenAPI Companion ${{ github.ref_name }}
          body: |
            ## Installation

            1. Download `openapi-companion-${{ steps.package.outputs.version }}.zip` below.
            2. Unzip it — you'll get a folder with the extension files inside.
               Keep it somewhere permanent (e.g. Documents).
            3. Open your browser's extensions page:
               - **Chrome** → `chrome://extensions`
               - **Edge** → `edge://extensions`
               - **Brave** → `brave://extensions`
            4. Enable **Developer mode** (top-right toggle).
            5. Click **Load unpacked** and select the unzipped folder.
            6. *(Optional)* Pin the OpenAPI Companion icon from the toolbar's puzzle menu.

            > **Note:** This is an unpacked developer build. The browser may show a
            > "Disable developer mode extensions" prompt occasionally — just dismiss it.
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ steps.package.outputs.zip_name }}
          fail_on_unmatched_files: true
